<!doctype html>
<html>
  <head>
    <title>Exam Helper - Pro</title>
    <style>
      body {
        font-family: Arial;
        background: #f0f0f0;
        padding: 20px;
      }
      .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 20px;
      }

      /* Grid of question numbers */
      .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 15px 0;
      }
      .grid-btn {
        width: 45px;
        height: 45px;
        border: 2px solid #ddd;
        background: white;
        cursor: hand;
        font-weight: bold;
        font-size: 14px;
        border-radius: 5px;
      }
      .grid-btn.selected {
        border-color: #007bff;
        background: #e3f2fd;
      }
      .grid-btn.answered {
        background: #d4edda;
        border-color: #28a745;
      }
      .grid-btn.pending {
        background: #fff3cd;
        border-color: #ffc107;
      }
      .grid-btn.sent {
        background: #cce5ff;
        border-color: #007bff;
      }

      /* Question display */
      .question-box {
        background: #f8f9fa;
        padding: 15px;
        margin: 10px 0;
        border-radius: 5px;
        border-left: 5px solid #007bff;
      }
      .question-box.answered {
        border-left-color: #28a745;
      }
      .question-box.pending {
        border-left-color: #ffc107;
      }

      textarea {
        width: 100%;
        height: 100px;
        margin: 10px 0;
        padding: 8px;
      }
      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        cursor: hand;
        border-radius: 5px;
      }
      .status {
        color: #666;
        font-size: 14px;
      }
      .role-selector {
        margin: 15px 0;
      }
      .role-selector button {
        padding: 8px 20px;
        margin: 0 5px;
      }
      .role-selector .active {
        background: #28a745;
      }

      .legend {
        display: flex;
        gap: 20px;
        margin: 10px 0;
        font-size: 14px;
      }
      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .legend .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
      }
      .legend .dot.answered {
        background: #28a745;
      }
      .legend .dot.pending {
        background: #ffc107;
      }
      .legend .dot.sent {
        background: #007bff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 Exam Helper Pro</h1>
      <p class="status">🔗 Share this link with your friend</p>

      <!-- Role Selector -->
      <div class="role-selector">
        <button id="roleMe" class="active" onclick="setRole('me')">
          👤 Me (Student)
        </button>
        <button id="roleFriend" onclick="setRole('friend')">
          👥 Friend (Helper)
        </button>
      </div>

      <!-- Legend -->
      <div class="legend">
        <span><span class="dot sent"></span> Sent (waiting for answer)</span>
        <span><span class="dot pending"></span> Pending (being answered)</span>
        <span><span class="dot answered"></span> Answered</span>
        <span><span class="dot" style="background: #ddd"></span> Empty</span>
      </div>

      <!-- Question Grid (1-100) -->
      <div class="grid" id="questionGrid"></div>

      <!-- Question Input Area -->
      <div id="questionArea">
        <h3>Question <span id="selectedNumber">1</span></h3>
        <textarea
          id="questionInput"
          placeholder="Paste question here..."
        ></textarea>
        <br />
        <button onclick="sendQuestion()">📤 Send Question</button>
        <button onclick="clearInput()" style="background: #6c757d">
          Clear
        </button>
      </div>

      <!-- Questions & Answers List -->
      <hr />
      <h3>📋 All Questions</h3>
      <button
        class="refresh-btn"
        onclick="loadData()"
        style="background: #28a745"
      >
        🔄 Refresh
      </button>
      <span class="status" id="statusText">Auto-refreshing...</span>
      <div id="dataDisplay"></div>
    </div>

    <script>
      // === SUPABASE CONFIGURATION ===
      var SUPABASE_URL = "https://ezemjswkfngduvfwnexv.supabase.co";
      var SUPABASE_KEY = "sb_publishable_ua_WKYTJpQprRAXvEJ4i1g_EBYaYONk";

      var selectedNumber = 1;
      var myRole = "me"; // 'me' or 'friend'
      var allQuestions = [];

      // === CREATE XHR ===
      function createXHR() {
        try {
          return new XMLHttpRequest();
        } catch (e) {}
        try {
          return new ActiveXObject("Msxml2.XMLHTTP.6.0");
        } catch (e) {}
        try {
          return new ActiveXObject("Microsoft.XMLHTTP");
        } catch (e) {}
        return null;
      }

      // === GET ELEMENT ===
      function getEl(id) {
        return document.getElementById(id);
      }

      // === SET ROLE ===
      function setRole(role) {
        myRole = role;
        document.getElementById("roleMe").className =
          role === "me" ? "active" : "";
        document.getElementById("roleFriend").className =
          role === "friend" ? "active" : "";
        loadData();
      }

      // === BUILD GRID ===
      function buildGrid() {
        var grid = getEl("questionGrid");
        var html = "";
        for (var i = 1; i <= 100; i++) {
          var cls = "grid-btn";
          // Check if this question exists in our data
          var exists = false;
          var status = "";
          for (var j = 0; j < allQuestions.length; j++) {
            if (allQuestions[j].number === i) {
              exists = true;
              status =
                allQuestions[j].answer && allQuestions[j].answer !== ""
                  ? "answered"
                  : "pending";
              break;
            }
          }
          if (exists) cls += " " + status;
          if (i === selectedNumber) cls += " selected";
          html +=
            '<button class="' +
            cls +
            '" onclick="selectQuestion(' +
            i +
            ')">' +
            i +
            "</button>";
        }
        grid.innerHTML = html;
      }

      // === SELECT QUESTION ===
      function selectQuestion(num) {
        selectedNumber = num;
        var input = getEl("questionInput");
        var label = getEl("selectedNumber");
        if (label) label.innerHTML = num;

        // Check if this question already exists
        var existing = getQuestionByNumber(num);
        if (existing) {
          if (input) input.value = existing.question;
          // Show if answered
          if (existing.answer && existing.answer !== "") {
            alert(
              "✅ This question already has an answer:\n\n" + existing.answer,
            );
          }
        } else {
          if (input) input.value = "";
        }

        buildGrid();
      }

      // === GET QUESTION BY NUMBER ===
      function getQuestionByNumber(num) {
        for (var i = 0; i < allQuestions.length; i++) {
          if (allQuestions[i].number === num) {
            return allQuestions[i];
          }
        }
        return null;
      }

      // === LOAD DATA ===
      function loadData() {
        var xhr = createXHR();
        if (!xhr) return;

        var url =
          SUPABASE_URL + "/rest/v1/exam_questions?select=*&order=id.asc";

        xhr.open("GET", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            try {
              allQuestions = JSON.parse(xhr.responseText);
              // Assign numbers based on order
              for (var i = 0; i < allQuestions.length; i++) {
                allQuestions[i].number = i + 1;
              }
              buildGrid();
              displayData();
              getEl("statusText").innerHTML = "✅ Updated " + getCurrentTime();
            } catch (e) {}
          }
        };
        xhr.send();
      }

      // === SEND QUESTION ===
      function sendQuestion() {
        var input = getEl("questionInput");
        var q = input ? input.value : "";

        if (q.trim() === "") {
          alert("Paste a question first.");
          return;
        }

        // Check if this number already exists
        var existing = getQuestionByNumber(selectedNumber);
        if (existing) {
          if (
            !confirm(
              "Question " + selectedNumber + " already exists. Replace it?",
            )
          ) {
            return;
          }
          // Delete existing
          deleteQuestion(existing.id, function () {
            sendNewQuestion(q);
          });
          return;
        }

        sendNewQuestion(q);
      }

      function sendNewQuestion(q) {
        var xhr = createXHR();
        if (!xhr) return;

        var url = SUPABASE_URL + "/rest/v1/exam_questions";
        var data =
          '{"question":"' +
          q.trim() +
          '","answer":"","number":' +
          selectedNumber +
          "}";

        xhr.open("POST", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Prefer", "return=minimal");

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 201 || xhr.status === 200) {
              getEl("questionInput").value = "";
              getEl("statusText").innerHTML =
                "✅ Question " + selectedNumber + " sent!";
              loadData();
            } else {
              getEl("statusText").innerHTML = "⚠️ Error: " + xhr.status;
            }
          }
        };
        xhr.send(data);
      }

      // === ADD ANSWER ===
      function addAnswer(id) {
        var answer = prompt("📝 Paste the AI answer here:");
        if (answer && answer.trim() !== "") {
          var xhr = createXHR();
          if (!xhr) return;

          var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;
          var data = '{"answer":"' + answer.trim() + '"}';

          xhr.open("PATCH", url, true);
          xhr.setRequestHeader("apikey", SUPABASE_KEY);
          xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
          xhr.setRequestHeader("Content-Type", "application/json");
          xhr.setRequestHeader("Prefer", "return=minimal");

          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status === 200 || xhr.status === 204) {
                getEl("statusText").innerHTML = "✅ Answer added!";
                loadData();
              }
            }
          };
          xhr.send(data);
        }
      }

      // === DELETE QUESTION ===
      function deleteQuestion(id, callback) {
        var xhr = createXHR();
        if (!xhr) return;

        var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;

        xhr.open("DELETE", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
        xhr.setRequestHeader("Prefer", "return=minimal");

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200 || xhr.status === 204) {
              if (callback) callback();
              loadData();
            }
          }
        };
        xhr.send();
      }

      // === DISPLAY DATA ===
      function displayData() {
        var div = getEl("dataDisplay");
        if (!div) return;

        var html = "";

        if (!allQuestions || allQuestions.length === 0) {
          html = "<p>No questions yet. Select a number and send one!</p>";
          div.innerHTML = html;
          return;
        }

        for (var i = 0; i < allQuestions.length; i++) {
          var item = allQuestions[i];
          var qNum = i + 1;
          var hasAnswer = item.answer && item.answer !== "";

          // If role is 'friend' and answered, skip (hide answered questions from friend)
          if (myRole === "friend" && hasAnswer) {
            continue;
          }

          var cls = hasAnswer
            ? "question-box answered"
            : "question-box pending";
          var statusIcon = hasAnswer ? "✅" : "⏳";
          var statusText = hasAnswer ? "Answered" : "Waiting for answer...";

          html += '<div class="' + cls + '">';
          html +=
            "<strong>" +
            statusIcon +
            " Q" +
            qNum +
            ":</strong> " +
            escapeHTML(item.question) +
            "<br>";

          if (hasAnswer) {
            html += "<strong>💡 Answer:</strong> " + escapeHTML(item.answer);
          } else {
            html += "⏳ " + statusText;
            if (myRole === "friend") {
              html +=
                ' <button onclick="addAnswer(' +
                item.id +
                ')">📝 Add Answer</button>';
            }
          }

          html += "</div>";
        }

        div.innerHTML = html;
      }

      // === ESCAPE HTML ===
      function escapeHTML(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // === GET CURRENT TIME ===
      function getCurrentTime() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds();
        if (m < 10) m = "0" + m;
        if (s < 10) s = "0" + s;
        return h + ":" + m + ":" + s;
      }

      // === CLEAR INPUT ===
      function clearInput() {
        var input = getEl("questionInput");
        if (input) input.value = "";
      }

      // === AUTO-REFRESH ===
      function autoRefresh() {
        loadData();
        window.setTimeout(autoRefresh, 10000);
      }

      // === INIT ===
      function init() {
        console.log("🚀 Exam Helper Pro Started");
        buildGrid();
        loadData();
        window.setTimeout(autoRefresh, 3000);
      }

      // === START ===
      if (document.readyState === "complete") {
        init();
      } else {
        window.attachEvent("onload", init);
      }
    </script>
  </body>
</html>
