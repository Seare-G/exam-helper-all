<!doctype html>
<html>
  <head>
    <title>Exam Helper</title>
    <style>
      body {
        font-family: Arial;
        background: #f0f0f0;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 20px;
      }
      textarea {
        width: 100%;
        height: 120px;
        margin: 10px 0;
        padding: 8px;
      }
      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        cursor: hand;
      }
      .box {
        background: #f8f9fa;
        padding: 10px;
        margin: 10px 0;
      }
      .answered {
        background: #d4edda;
      }
      .pending {
        background: #fff3cd;
      }
      .small-btn {
        padding: 5px 10px;
        font-size: 12px;
      }
      .status {
        color: #666;
        font-size: 14px;
      }
      .refresh-btn {
        background: #28a745;
      }
      .delete-btn {
        background: #dc3545;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 Exam Helper</h1>
      <p class="status">🔗 Share this link with your friend</p>

      <h3>📤 Send Question</h3>
      <textarea
        id="questionInput"
        placeholder="Paste question here..."
      ></textarea>
      <br />
      <button onclick="sendQuestion()">📤 Send</button>
      <button onclick="clearInput()" style="background: #6c757d">Clear</button>

      <hr />
      <h3>📋 Questions & Answers</h3>
      <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
      <span class="status" id="statusText">Auto-refreshing...</span>
      <div id="dataDisplay"></div>
    </div>

    <script>
      // === SUPABASE CONFIGURATION ===
      var SUPABASE_URL = "https://ezemjswkfngduvfwnexv.supabase.co";
      var SUPABASE_KEY = "sb_publishable_ua_WKYTJpQprRAXvEJ4i1g_EBYaYONk";

      // === Universal XHR Creator (Works in ALL IE versions) ===
      function createXHR() {
        try {
          return new XMLHttpRequest();
        } catch (e) {}
        try {
          return new ActiveXObject("Msxml2.XMLHTTP.6.0");
        } catch (e) {}
        try {
          return new ActiveXObject("Msxml2.XMLHTTP.3.0");
        } catch (e) {}
        try {
          return new ActiveXObject("Msxml2.XMLHTTP");
        } catch (e) {}
        try {
          return new ActiveXObject("Microsoft.XMLHTTP");
        } catch (e) {}
        return null;
      }

      // === Universal CORS XHR (Works in IE 8/9 with XDomainRequest) ===
      function createCORSXHR() {
        try {
          return new XMLHttpRequest();
        } catch (e) {}
        try {
          return new XDomainRequest();
        } catch (e) {}
        try {
          return new ActiveXObject("Msxml2.XMLHTTP.6.0");
        } catch (e) {}
        try {
          return new ActiveXObject("Microsoft.XMLHTTP");
        } catch (e) {}
        return null;
      }

      // === Universal JSON Parser (Works in IE 6/7) ===
      function parseJSON(str) {
        try {
          return JSON.parse(str);
        } catch (e) {}
        try {
          return eval("(" + str + ")");
        } catch (e) {}
        return null;
      }

      // === Universal JSON Stringifier (Works in IE 6/7) ===
      function stringifyJSON(obj) {
        try {
          return JSON.stringify(obj);
        } catch (e) {}
        // Simple manual stringify for IE 6/7
        if (typeof obj === "object") {
          var str = "{";
          for (var key in obj) {
            if (obj.hasOwnProperty(key)) {
              var val = obj[key];
              if (typeof val === "string") val = '"' + val + '"';
              str += '"' + key + '":' + val + ",";
            }
          }
          str = str.replace(/,$/, "") + "}";
          return str;
        }
        return "" + obj;
      }

      // === Load Data ===
      function loadData() {
        document.getElementById("statusText").innerHTML = "⏳ Loading...";

        var xhr = createCORSXHR();
        if (!xhr) {
          document.getElementById("statusText").innerHTML =
            "⚠️ Browser not supported";
          return;
        }

        var url =
          SUPABASE_URL + "/rest/v1/exam_questions?select=*&order=id.asc";

        // Handle XDomainRequest (IE 8/9)
        if (xhr.open && xhr.send) {
          xhr.open("GET", url, true);

          if (xhr.setRequestHeader) {
            xhr.setRequestHeader("apikey", SUPABASE_KEY);
            xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
            xhr.setRequestHeader("Content-Type", "application/json");
          }

          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status === 200) {
                var data = parseJSON(xhr.responseText);
                if (data) {
                  displayData(data);
                  document.getElementById("statusText").innerHTML =
                    "✅ Updated " + getCurrentTime();
                }
              } else {
                document.getElementById("statusText").innerHTML =
                  "⚠️ Error: " + xhr.status;
              }
            }
          };
          xhr.send();
        } else {
          // Fallback for older IE
          document.getElementById("statusText").innerHTML =
            "⚠️ Browser not supported";
        }
      }

      // === Send Question ===
      function sendQuestion() {
        var q = document.getElementById("questionInput").value;
        if (q.trim() === "") {
          alert("Paste a question first.");
          return;
        }

        document.getElementById("statusText").innerHTML = "⏳ Sending...";

        var xhr = createCORSXHR();
        if (!xhr) {
          document.getElementById("statusText").innerHTML =
            "⚠️ Browser not supported";
          return;
        }

        var url = SUPABASE_URL + "/rest/v1/exam_questions";
        var data = '{"question":"' + q.trim() + '","answer":""}';

        if (xhr.open && xhr.send) {
          xhr.open("POST", url, true);

          if (xhr.setRequestHeader) {
            xhr.setRequestHeader("apikey", SUPABASE_KEY);
            xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.setRequestHeader("Prefer", "return=minimal");
          }

          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status === 201 || xhr.status === 200) {
                document.getElementById("questionInput").value = "";
                document.getElementById("statusText").innerHTML =
                  "✅ Question sent!";
                loadData();
              } else {
                document.getElementById("statusText").innerHTML =
                  "⚠️ Error: " + xhr.status;
              }
            }
          };
          xhr.send(data);
        }
      }

      // === Add Answer ===
      function addAnswer(id) {
        var answer = prompt("📝 Paste the AI answer here:");
        if (answer && answer.trim() !== "") {
          document.getElementById("statusText").innerHTML =
            "⏳ Sending answer...";

          var xhr = createCORSXHR();
          if (!xhr) {
            document.getElementById("statusText").innerHTML =
              "⚠️ Browser not supported";
            return;
          }

          var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;
          var data = '{"answer":"' + answer.trim() + '"}';

          if (xhr.open && xhr.send) {
            xhr.open("PATCH", url, true);

            if (xhr.setRequestHeader) {
              xhr.setRequestHeader("apikey", SUPABASE_KEY);
              xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
              xhr.setRequestHeader("Content-Type", "application/json");
              xhr.setRequestHeader("Prefer", "return=minimal");
            }

            xhr.onreadystatechange = function () {
              if (xhr.readyState === 4) {
                if (xhr.status === 200 || xhr.status === 204) {
                  document.getElementById("statusText").innerHTML =
                    "✅ Answer added!";
                  loadData();
                } else {
                  document.getElementById("statusText").innerHTML =
                    "⚠️ Error: " + xhr.status;
                }
              }
            };
            xhr.send(data);
          }
        }
      }

      // === Delete Question ===
      function deleteQuestion(id) {
        if (confirm("Delete this question?")) {
          var xhr = createCORSXHR();
          if (!xhr) {
            document.getElementById("statusText").innerHTML =
              "⚠️ Browser not supported";
            return;
          }

          var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;

          if (xhr.open && xhr.send) {
            xhr.open("DELETE", url, true);

            if (xhr.setRequestHeader) {
              xhr.setRequestHeader("apikey", SUPABASE_KEY);
              xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
              xhr.setRequestHeader("Prefer", "return=minimal");
            }

            xhr.onreadystatechange = function () {
              if (xhr.readyState === 4) {
                if (xhr.status === 200 || xhr.status === 204) {
                  loadData();
                }
              }
            };
            xhr.send();
          }
        }
      }

      // === Display Data ===
      function displayData(data) {
        var div = document.getElementById("dataDisplay");
        div.innerHTML = "";

        if (!data || data.length === 0) {
          div.innerHTML = "<p>No questions yet. Send one!</p>";
          return;
        }

        for (var i = 0; i < data.length; i++) {
          var item = data[i];
          var cls = item.answer && item.answer !== "" ? "answered" : "pending";
          var statusIcon = item.answer && item.answer !== "" ? "✅" : "⏳";

          div.innerHTML += '<div class="box ' + cls + '">';
          div.innerHTML +=
            "<strong>" +
            statusIcon +
            " Q" +
            (i + 1) +
            ":</strong> " +
            item.question +
            "<br>";

          if (item.answer && item.answer !== "") {
            div.innerHTML += "<strong>💡 Answer:</strong> " + item.answer;
          } else {
            div.innerHTML += "⏳ Waiting for answer... ";
            div.innerHTML +=
              '<button class="small-btn" onclick="addAnswer(' +
              item.id +
              ')">📝 Add Answer</button>';
          }

          div.innerHTML +=
            ' <button class="small-btn delete-btn" onclick="deleteQuestion(' +
            item.id +
            ')">🗑️</button>';
          div.innerHTML += "</div>";
        }
      }

      // === Get Current Time ===
      function getCurrentTime() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds();
        if (m < 10) m = "0" + m;
        if (s < 10) s = "0" + s;
        return h + ":" + m + ":" + s;
      }

      // === Clear Input ===
      function clearInput() {
        document.getElementById("questionInput").value = "";
      }

      // === Auto-Refresh ===
      function autoRefresh() {
        loadData();
        setTimeout(autoRefresh, 10000);
      }

      // === Start ===
      loadData();
      setTimeout(autoRefresh, 3000);
    </script>
  </body>
</html>
