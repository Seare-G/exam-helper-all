<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
</head>
<body>
    <div id="grid"></div>

    <script>
        var grid = document.getElementById('grid');
        var html = '';

        for (var i = 1; i <= 100; i++) {
            html += '<span style="display:inline-block;width:40px;height:40px;border:1px solid #ccc;margin:2px;text-align:center;line-height:40px;font-family:Arial;font-size:14px;cursor:pointer;" onclick="alert(' + i + ')">' + i + '</span>';
            if (i % 10 === 0) {
                html += '<br>';
            }
        }

        grid.innerHTML = html;
    </script>
</body>
</html>
