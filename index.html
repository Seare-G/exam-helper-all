<!doctype html>
<html>
  <head>
    <title>Exam Helper - Pro</title>
    <style>
      body {
        font-family: Arial;
        background: #f0f0f0;
        padding: 20px;
      }
      .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 20px;
      }

      .grid {
        display: block;
        margin: 15px 0;
        padding: 10px;
        background: #f8f9fa;
        border: 1px solid #ddd;
      }
      .grid-row {
        display: block;
        margin: 4px 0;
        clear: both;
      }
      .grid-btn {
        float: left;
        width: 35px;
        height: 35px;
        margin: 2px;
        border: 1px solid #ccc;
        background: white;
        cursor: hand;
        font-weight: bold;
        font-size: 12px;
        text-align: center;
        line-height: 35px;
      }
      .grid-btn.selected {
        border-color: #007bff;
        background: #cce5ff;
      }
      .grid-btn.answered {
        background: #d4edda;
        border-color: #28a745;
      }
      .grid-btn.pending {
        background: #fff3cd;
        border-color: #ffc107;
      }
      .grid-btn.sent {
        background: #cce5ff;
        border-color: #007bff;
      }

      .question-box {
        background: #f8f9fa;
        padding: 15px;
        margin: 10px 0;
        border-left: 5px solid #007bff;
      }
      .question-box.answered {
        border-left-color: #28a745;
      }
      .question-box.pending {
        border-left-color: #ffc107;
      }

      textarea {
        width: 100%;
        height: 80px;
        margin: 10px 0;
        padding: 8px;
      }
      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        cursor: hand;
      }
      .status {
        color: #666;
        font-size: 14px;
      }
      .role-btn {
        padding: 8px 20px;
        margin: 0 5px;
        background: #6c757d;
        color: white;
        border: none;
        cursor: hand;
      }
      .role-btn.active {
        background: #28a745;
      }

      .legend {
        margin: 10px 0;
        font-size: 14px;
      }
      .legend span {
        margin-right: 15px;
      }
      .legend .dot {
        display: inline-block;
        width: 12px;
        height: 12px;
        margin-right: 3px;
      }
      .legend .dot.answered {
        background: #28a745;
      }
      .legend .dot.pending {
        background: #ffc107;
      }
      .legend .dot.sent {
        background: #007bff;
      }
      .legend .dot.empty {
        background: #ddd;
      }

      .clear {
        clear: both;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 Exam Helper Pro</h1>
      <p class="status">🔗 Share this link with your friend</p>

      <!-- Role Selector -->
      <div>
        <button class="role-btn active" id="roleMe" onclick="setRole('me')">
          👤 Me (Student)
        </button>
        <button class="role-btn" id="roleFriend" onclick="setRole('friend')">
          👥 Friend (Helper)
        </button>
      </div>

      <!-- Legend -->
      <div class="legend">
        <span><span class="dot sent"></span> Sent</span>
        <span><span class="dot pending"></span> Pending</span>
        <span><span class="dot answered"></span> Answered</span>
        <span><span class="dot empty"></span> Empty</span>
      </div>

      <!-- Question Grid (1-100) -->
      <div class="grid" id="questionGrid"></div>
      <div class="clear"></div>

      <!-- Question Input Area -->
      <div id="questionArea">
        <h3>Question <span id="selectedNumber">1</span></h3>
        <textarea
          id="questionInput"
          placeholder="Paste question here..."
        ></textarea>
        <br />
        <button onclick="sendQuestion()">📤 Send Question</button>
        <button onclick="clearInput()" style="background: #6c757d">
          Clear
        </button>
      </div>

      <hr />
      <h3>📋 Questions & Answers</h3>
      <button onclick="loadData()" style="background: #28a745">
        🔄 Refresh
      </button>
      <span class="status" id="statusText">Auto-refreshing...</span>
      <div id="dataDisplay"></div>
    </div>

    <script>
      // === SUPABASE CONFIGURATION ===
      var SUPABASE_URL = "https://ezemjswkfngduvfwnexv.supabase.co";
      var SUPABASE_KEY = "sb_publishable_ua_WKYTJpQprRAXvEJ4i1g_EBYaYONk";

      var selectedNumber = 1;
      var myRole = "me";
      var allQuestions = [];

      // === CREATE XHR ===
      function createXHR() {
        try {
          return new XMLHttpRequest();
        } catch (e) {}
        try {
          return new ActiveXObject("Msxml2.XMLHTTP.6.0");
        } catch (e) {}
        try {
          return new ActiveXObject("Microsoft.XMLHTTP");
        } catch (e) {}
        return null;
      }

      // === GET ELEMENT ===
      function getEl(id) {
        return document.getElementById(id);
      }

      // === SET ROLE ===
      function setRole(role) {
        myRole = role;
        var meBtn = getEl("roleMe");
        var friendBtn = getEl("roleFriend");
        if (meBtn)
          meBtn.className = role === "me" ? "role-btn active" : "role-btn";
        if (friendBtn)
          friendBtn.className =
            role === "friend" ? "role-btn active" : "role-btn";
        displayData();
      }

      // === BUILD GRID ===
      function buildGrid() {
        var grid = getEl("questionGrid");
        if (!grid) return;

        var html = "";
        var count = 0;

        for (var i = 1; i <= 100; i++) {
          // Start new row every 10 numbers
          if (count === 0) {
            html += '<div class="grid-row">';
          }

          var cls = "grid-btn";
          var status = getQuestionStatus(i);
          if (status === "answered") cls += " answered";
          else if (status === "pending") cls += " pending";
          else if (status === "sent") cls += " sent";
          if (i === selectedNumber) cls += " selected";

          html +=
            '<button class="' +
            cls +
            '" onclick="selectQuestion(' +
            i +
            ')">' +
            i +
            "</button>";

          count++;
          if (count === 10) {
            html += "</div>";
            count = 0;
          }
        }
        // Close last row if needed
        if (count > 0) {
          html += "</div>";
        }

        grid.innerHTML = html;
      }

      // === GET QUESTION STATUS ===
      function getQuestionStatus(num) {
        for (var i = 0; i < allQuestions.length; i++) {
          if (allQuestions[i].number === num) {
            if (allQuestions[i].answer && allQuestions[i].answer !== "") {
              return "answered";
            }
            return "pending";
          }
        }
        return "empty";
      }

      // === SELECT QUESTION ===
      function selectQuestion(num) {
        selectedNumber = num;
        var label = getEl("selectedNumber");
        if (label) label.innerHTML = num;

        var input = getEl("questionInput");
        var existing = getQuestionByNumber(num);
        if (existing) {
          if (input) input.value = existing.question;
          if (existing.answer && existing.answer !== "") {
            // Show answer in console or alert
            console.log("✅ Answer for Q" + num + ":", existing.answer);
          }
        } else {
          if (input) input.value = "";
        }

        buildGrid();
      }

      // === GET QUESTION BY NUMBER ===
      function getQuestionByNumber(num) {
        for (var i = 0; i < allQuestions.length; i++) {
          if (allQuestions[i].number === num) {
            return allQuestions[i];
          }
        }
        return null;
      }

      // === LOAD DATA ===
      function loadData() {
        var xhr = createXHR();
        if (!xhr) return;

        var url =
          SUPABASE_URL + "/rest/v1/exam_questions?select=*&order=id.asc";

        xhr.open("GET", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              // Add number property based on position
              allQuestions = [];
              for (var i = 0; i < data.length; i++) {
                data[i].number = i + 1;
                allQuestions.push(data[i]);
              }
              buildGrid();
              displayData();
              var statusEl = getEl("statusText");
              if (statusEl)
                statusEl.innerHTML = "✅ Updated " + getCurrentTime();
            } catch (e) {
              console.log("Error parsing:", e);
            }
          }
        };
        xhr.send();
      }

      // === SEND QUESTION ===
      function sendQuestion() {
        var input = getEl("questionInput");
        var q = input ? input.value : "";

        if (q.trim() === "") {
          alert("Paste a question first.");
          return;
        }

        var existing = getQuestionByNumber(selectedNumber);
        if (existing) {
          if (
            !confirm(
              "Question " + selectedNumber + " already exists. Replace it?",
            )
          ) {
            return;
          }
          deleteQuestion(existing.id, function () {
            sendNewQuestion(q);
          });
          return;
        }

        sendNewQuestion(q);
      }

      function sendNewQuestion(q) {
        var xhr = createXHR();
        if (!xhr) return;

        var url = SUPABASE_URL + "/rest/v1/exam_questions";
        var data = '{"question":"' + q.trim() + '","answer":""}';

        xhr.open("POST", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Prefer", "return=minimal");

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 201 || xhr.status === 200) {
              // Clear input IMMEDIATELY so you can paste next question
              var input = getEl("questionInput");
              if (input) input.value = "";
              var statusEl = getEl("statusText");
              if (statusEl)
                statusEl.innerHTML = "✅ Question " + selectedNumber + " sent!";
              // Select next number automatically
              var nextNum = selectedNumber + 1;
              if (nextNum <= 100) {
                selectQuestion(nextNum);
              }
              loadData();
            } else {
              var statusEl = getEl("statusText");
              if (statusEl) statusEl.innerHTML = "⚠️ Error: " + xhr.status;
            }
          }
        };
        xhr.send(data);
      }

      // === ADD ANSWER ===
      function addAnswer(id) {
        var answer = prompt("📝 Paste the AI answer here:");
        if (answer && answer.trim() !== "") {
          var xhr = createXHR();
          if (!xhr) return;

          var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;
          var data = '{"answer":"' + answer.trim() + '"}';

          xhr.open("PATCH", url, true);
          xhr.setRequestHeader("apikey", SUPABASE_KEY);
          xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
          xhr.setRequestHeader("Content-Type", "application/json");
          xhr.setRequestHeader("Prefer", "return=minimal");

          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status === 200 || xhr.status === 204) {
                var statusEl = getEl("statusText");
                if (statusEl) statusEl.innerHTML = "✅ Answer added!";
                loadData();
              }
            }
          };
          xhr.send(data);
        }
      }

      // === DELETE QUESTION ===
      function deleteQuestion(id, callback) {
        var xhr = createXHR();
        if (!xhr) return;

        var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;

        xhr.open("DELETE", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
        xhr.setRequestHeader("Prefer", "return=minimal");

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200 || xhr.status === 204) {
              if (callback) callback();
            }
          }
        };
        xhr.send();
      }

      // === DISPLAY DATA ===
      function displayData() {
        var div = getEl("dataDisplay");
        if (!div) return;

        var html = "";

        if (!allQuestions || allQuestions.length === 0) {
          html = "<p>No questions yet. Select a number and send one!</p>";
          div.innerHTML = html;
          return;
        }

        var displayed = 0;
        for (var i = 0; i < allQuestions.length; i++) {
          var item = allQuestions[i];
          var qNum = item.number || i + 1;
          var hasAnswer = item.answer && item.answer !== "";

          // If role is 'friend' and answered, skip (hide answered questions from friend)
          if (myRole === "friend" && hasAnswer) {
            continue;
          }

          displayed++;
          var cls = hasAnswer
            ? "question-box answered"
            : "question-box pending";
          var statusIcon = hasAnswer ? "✅" : "⏳";
          var statusText = hasAnswer ? "Answered" : "Waiting for answer...";

          html += '<div class="' + cls + '">';
          html +=
            "<strong>" +
            statusIcon +
            " Q" +
            qNum +
            ":</strong> " +
            escapeHTML(item.question) +
            "<br>";

          if (hasAnswer) {
            html += "<strong>💡 Answer:</strong> " + escapeHTML(item.answer);
          } else {
            html += "⏳ " + statusText;
            if (myRole === "friend") {
              html +=
                ' <button onclick="addAnswer(' +
                item.id +
                ')">📝 Add Answer</button>';
            }
          }

          html += "</div>";
        }

        if (displayed === 0 && myRole === "friend") {
          html =
            "<p>✅ All questions have been answered! Nothing to do here.</p>";
        }

        div.innerHTML = html;
      }

      // === ESCAPE HTML ===
      function escapeHTML(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // === GET CURRENT TIME ===
      function getCurrentTime() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds();
        if (m < 10) m = "0" + m;
        if (s < 10) s = "0" + s;
        return h + ":" + m + ":" + s;
      }

      // === CLEAR INPUT ===
      function clearInput() {
        var input = getEl("questionInput");
        if (input) input.value = "";
      }

      // === AUTO-REFRESH ===
      function autoRefresh() {
        loadData();
        window.setTimeout(autoRefresh, 10000);
      }

      // === INIT ===
      function init() {
        console.log("🚀 Exam Helper Pro Started (IE Compatible)");
        buildGrid();
        loadData();
        window.setTimeout(autoRefresh, 3000);
      }

      // === START ===
      if (document.readyState === "complete") {
        init();
      } else {
        window.attachEvent("onload", init);
      }
    </script>
  </body>
</html>
