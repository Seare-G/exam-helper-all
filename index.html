<!doctype html>
<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Exam Helper</title>
    <style>
      body {
        font-family: Arial;
        background: #f0f0f0;
        padding: 20px;
      }
      .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 20px;
      }

      .grid-table {
        width: 100%;
        border-collapse: collapse;
        background: #f8f9fa;
        border: 1px solid #ddd;
        margin: 10px 0;
      }
      .grid-table td {
        padding: 3px;
        text-align: center;
        width: 10%;
      }
      .grid-btn {
        width: 100%;
        height: 50px;
        border: 2px solid #ccc;
        background: white;
        cursor: hand;
        font-weight: bold;
        font-size: 14px;
        font-family: Arial;
      }
      .grid-btn.selected {
        border-color: #007bff;
        background: #cce5ff;
      }
      .grid-btn.answered {
        background: #d4edda;
        border-color: #28a745;
      }
      .grid-btn.pending {
        background: #fff3cd;
        border-color: #ffc107;
      }
      .grid-btn .answer-text {
        display: block;
        font-size: 10px;
        color: #28a745;
      }

      .question-area {
        background: #f8f9fa;
        padding: 15px;
        margin: 10px 0;
        border-left: 5px solid #007bff;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 8px;
        margin: 5px 0;
        font-family: Arial;
      }
      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        cursor: hand;
        font-family: Arial;
      }
      .status {
        color: #666;
        font-size: 14px;
      }
      .question-list {
        margin-top: 20px;
      }
      .q-item {
        padding: 10px;
        margin: 5px 0;
        border-left: 5px solid #ffc107;
        background: #fff;
      }
      .q-item.answered {
        border-left-color: #28a745;
      }
      .q-item .q-text {
        font-weight: bold;
      }
      .q-item .q-answer {
        color: #28a745;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 Exam Helper</h1>
      <p class="status">🔗 Share this link with your friend</p>

      <!-- Number Grid (1-100) -->
      <table
        class="grid-table"
        id="questionGrid"
        cellpadding="0"
        cellspacing="0"
      ></table>

      <!-- Question Input -->
      <div class="question-area">
        <h3>Question <span id="selectedNumber">1</span></h3>
        <textarea
          id="questionInput"
          placeholder="Paste question here..."
        ></textarea>
        <br />
        <button onclick="sendQuestion()">📤 Send Question</button>
        <button onclick="clearInput()" style="background: #6c757d">
          Clear
        </button>
      </div>

      <!-- All Questions List -->
      <hr />
      <h3>📋 All Questions</h3>
      <button onclick="loadData()" style="background: #28a745">
        🔄 Refresh
      </button>
      <span class="status" id="statusText">Auto-refreshing...</span>
      <div class="question-list" id="dataDisplay"></div>
    </div>

    <script>
      // === IE POLYFILLS ===
      if (!String.prototype.trim) {
        String.prototype.trim = function () {
          return this.replace(/^\s+|\s+$/g, "");
        };
      }
      if (typeof JSON === "undefined") {
        JSON = {
          parse: function (s) {
            return eval("(" + s + ")");
          },
          stringify: function (obj) {
            var parts = [];
            for (var key in obj) {
              if (obj.hasOwnProperty(key)) {
                var val = obj[key];
                var escaped =
                  '"' +
                  String(val)
                    .replace(/\\/g, "\\\\")
                    .replace(/"/g, '\\"')
                    .replace(/\r/g, "\\r")
                    .replace(/\n/g, "\\n")
                    .replace(/\t/g, "\\t") +
                  '"';
                parts.push('"' + key + '":' + escaped);
              }
            }
            return "{" + parts.join(",") + "}";
          },
        };
      }

      // === SUPABASE CONFIGURATION ===
      var SUPABASE_URL = "https://ezemjswkfngduvfwnexv.supabase.co";
      var SUPABASE_KEY = "sb_publishable_ua_WKYTJpQprRAXvEJ4i1g_EBYaYONk";

      var selectedNumber = 1;
      var allQuestions = [];

      // === CREATE XHR (Works in ALL IE versions) ===
      function createXHR() {
        try {
          return new XMLHttpRequest();
        } catch (e) {}
        try {
          return new ActiveXObject("Msxml2.XMLHTTP.6.0");
        } catch (e) {}
        try {
          return new ActiveXObject("Microsoft.XMLHTTP");
        } catch (e) {}
        return null;
      }

      // === GET ELEMENT ===
      function getEl(id) {
        return document.getElementById(id);
      }

      // === BUILD GRID (Using DOM Methods - IE Compatible) ===
      function buildGrid() {
        var grid = getEl("questionGrid");
        if (!grid) return;

        // Clear the table using DOM methods (NOT innerHTML)
        while (grid.hasChildNodes()) {
          grid.removeChild(grid.lastChild);
        }

        for (var row = 0; row < 10; row++) {
          var tr = document.createElement("tr");

          for (var col = 0; col < 10; col++) {
            var num = row * 10 + col + 1;
            if (num > 100) break;

            var td = document.createElement("td");

            var btn = document.createElement("button");
            btn.className = "grid-btn";
            btn.onclick = (function (n) {
              return function () {
                selectQuestion(n);
              };
            })(num);

            // Check status
            var status = getQuestionStatus(num);
            if (status === "answered") {
              btn.className += " answered";
              var q = getQuestionByNumber(num);
              if (q && q.answer) {
                // Add answer text below the number
                var numSpan = document.createTextNode(num);
                btn.appendChild(numSpan);
                var answerSpan = document.createElement("span");
                answerSpan.className = "answer-text";
                answerSpan.appendChild(document.createTextNode(q.answer));
                btn.appendChild(answerSpan);
              } else {
                btn.appendChild(document.createTextNode(num));
              }
            } else if (status === "pending") {
              btn.className += " pending";
              btn.appendChild(document.createTextNode(num));
            } else {
              btn.appendChild(document.createTextNode(num));
            }

            if (num === selectedNumber) {
              btn.className += " selected";
            }

            td.appendChild(btn);
            tr.appendChild(td);
          }

          grid.appendChild(tr);
        }
      }

      // === GET QUESTION STATUS ===
      function getQuestionStatus(num) {
        var q = getQuestionByNumber(num);
        if (!q) return "empty";
        if (q.answer && q.answer !== "") return "answered";
        return "pending";
      }

      // === GET QUESTION BY NUMBER ===
      function getQuestionByNumber(num) {
        for (var i = 0; i < allQuestions.length; i++) {
          if (allQuestions[i].number === num) {
            return allQuestions[i];
          }
        }
        return null;
      }

      // === SELECT QUESTION ===
      function selectQuestion(num) {
        selectedNumber = num;
        var label = getEl("selectedNumber");
        if (label) label.innerHTML = num;

        var input = getEl("questionInput");
        var existing = getQuestionByNumber(num);
        if (existing) {
          if (input) input.value = existing.question;
        } else {
          if (input) input.value = "";
        }

        buildGrid();
      }

      // === LOAD DATA ===
      function loadData() {
        var xhr = createXHR();
        if (!xhr) {
          var statusEl = getEl("statusText");
          if (statusEl) statusEl.innerHTML = "⚠️ Browser not supported";
          return;
        }

        var url =
          SUPABASE_URL + "/rest/v1/exam_questions?select=*&order=id.asc";

        xhr.open("GET", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              try {
                var data = JSON.parse(xhr.responseText);
                allQuestions = [];
                for (var i = 0; i < data.length; i++) {
                  data[i].number = i + 1;
                  allQuestions.push(data[i]);
                }
                buildGrid();
                displayData();
                var statusEl = getEl("statusText");
                if (statusEl)
                  statusEl.innerHTML = "✅ Updated " + getCurrentTime();
              } catch (e) {
                var statusEl = getEl("statusText");
                if (statusEl) statusEl.innerHTML = "⚠️ Error parsing data";
              }
            } else {
              var statusEl = getEl("statusText");
              if (statusEl) statusEl.innerHTML = "⚠️ Error: " + xhr.status;
            }
          }
        };
        xhr.send();
      }

      // === SEND QUESTION ===
      function sendQuestion() {
        var input = getEl("questionInput");
        var q = input ? input.value : "";

        if (q.trim() === "") {
          alert("Paste a question first.");
          return;
        }

        var existing = getQuestionByNumber(selectedNumber);
        if (existing) {
          if (
            !confirm(
              "Question " + selectedNumber + " already exists. Replace it?",
            )
          ) {
            return;
          }
          deleteQuestion(existing.id, function () {
            sendNewQuestion(q);
          });
          return;
        }

        sendNewQuestion(q);
      }

      function sendNewQuestion(q) {
        var xhr = createXHR();
        if (!xhr) return;

        var url = SUPABASE_URL + "/rest/v1/exam_questions";
        var data = JSON.stringify({ question: q.trim(), answer: "" });

        xhr.open("POST", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Prefer", "return=minimal");

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 201 || xhr.status === 200) {
              var input = getEl("questionInput");
              if (input) input.value = "";
              var statusEl = getEl("statusText");
              if (statusEl)
                statusEl.innerHTML = "✅ Question " + selectedNumber + " sent!";
              var nextNum = selectedNumber + 1;
              if (nextNum <= 100) {
                selectQuestion(nextNum);
              }
              loadData();
            } else {
              var statusEl = getEl("statusText");
              if (statusEl) statusEl.innerHTML = "⚠️ Error: " + xhr.status;
            }
          }
        };
        xhr.send(data);
      }

      // === ADD ANSWER ===
      function addAnswer(id) {
        var answer = prompt("📝 Enter the answer (a, b, c, or d):");
        if (answer && answer.trim() !== "") {
          var xhr = createXHR();
          if (!xhr) return;

          var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;
          var data = JSON.stringify({ answer: answer.trim() });

          xhr.open("PATCH", url, true);
          xhr.setRequestHeader("apikey", SUPABASE_KEY);
          xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
          xhr.setRequestHeader("Content-Type", "application/json");
          xhr.setRequestHeader("Prefer", "return=minimal");

          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status === 200 || xhr.status === 204) {
                var statusEl = getEl("statusText");
                if (statusEl) statusEl.innerHTML = "✅ Answer added!";
                loadData();
              }
            }
          };
          xhr.send(data);
        }
      }

      // === DELETE QUESTION ===
      function deleteQuestion(id, callback) {
        var xhr = createXHR();
        if (!xhr) return;

        var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;

        xhr.open("DELETE", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
        xhr.setRequestHeader("Prefer", "return=minimal");

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200 || xhr.status === 204) {
              if (callback) callback();
              loadData();
            }
          }
        };
        xhr.send();
      }

      // === DISPLAY DATA ===
      function displayData() {
        var div = getEl("dataDisplay");
        if (!div) return;

        var html = "";

        if (!allQuestions || allQuestions.length === 0) {
          html = "<p>No questions yet. Select a number and send one!</p>";
          div.innerHTML = html;
          return;
        }

        for (var i = 0; i < allQuestions.length; i++) {
          var item = allQuestions[i];
          var qNum = item.number || i + 1;
          var hasAnswer = item.answer && item.answer !== "";
          var cls = hasAnswer ? "q-item answered" : "q-item";

          html += '<div class="' + cls + '">';
          html +=
            '<span class="q-text">Q' +
            qNum +
            ":</span> " +
            escapeHTML(item.question);
          if (hasAnswer) {
            html +=
              ' → <span class="q-answer">Answer: ' +
              escapeHTML(item.answer) +
              "</span>";
          } else {
            html +=
              ' <button onclick="addAnswer(' +
              item.id +
              ')">Add Answer</button>';
          }
          html += "</div>";
        }

        div.innerHTML = html;
      }

      // === ESCAPE HTML ===
      function escapeHTML(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // === GET CURRENT TIME ===
      function getCurrentTime() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds();
        if (m < 10) m = "0" + m;
        if (s < 10) s = "0" + s;
        return h + ":" + m + ":" + s;
      }

      // === CLEAR INPUT ===
      function clearInput() {
        var input = getEl("questionInput");
        if (input) input.value = "";
      }

      // === AUTO-REFRESH ===
      function autoRefresh() {
        loadData();
        window.setTimeout(autoRefresh, 10000);
      }

      // === INIT ===
      function init() {
        buildGrid();
        loadData();
        window.setTimeout(autoRefresh, 3000);
      }

      // === START (script is at bottom — DOM is ready) ===
      init();
    </script>
  </body>
</html>
