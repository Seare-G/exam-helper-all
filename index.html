<!doctype html>
<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Exam Helper</title>
    <style>
      body {
        font-family: Arial;
        background: #f0f0f0;
        padding: 20px;
      }
      .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 20px;
      }

      .grid {
        display: block;
        margin: 10px 0;
        padding: 10px;
        background: #f8f9fa;
        border: 1px solid #ddd;
      }
      .box {
        display: inline-block;
        width: 50px;
        height: 50px;
        margin: 3px;
        border: 2px solid #ccc;
        background: white;
        cursor: pointer;
        text-align: center;
        font-weight: bold;
        font-size: 14px;
        line-height: 50px;
        vertical-align: top;
      }
      .box.selected {
        border-color: #007bff;
        background: #cce5ff;
      }
      .box.answered {
        background: #d4edda;
        border-color: #28a745;
      }
      .box.pending {
        background: #fff3cd;
        border-color: #ffc107;
      }
      .box .answer-text {
        display: block;
        font-size: 10px;
        line-height: 12px;
        color: #28a745;
      }

      .question-area {
        background: #f8f9fa;
        padding: 15px;
        margin: 10px 0;
        border-left: 5px solid #007bff;
      }
      textarea {
        width: 100%;
        height: 80px;
        padding: 8px;
        margin: 5px 0;
        font-family: Arial;
      }
      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        font-family: Arial;
      }
      .status {
        color: #666;
        font-size: 14px;
      }
      .clear {
        clear: both;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 Exam Helper</h1>
      <p class="status">🔗 Share this link with your friend</p>

      <!-- Grid of 100 boxes -->
      <div class="grid" id="gridContainer"></div>

      <!-- Question Input -->
      <div class="question-area">
        <h3>Question <span id="selectedNumber">1</span></h3>
        <textarea
          id="questionInput"
          placeholder="Paste question here..."
        ></textarea>
        <br />
        <button onclick="sendQuestion()">📤 Send Question</button>
        <button onclick="clearInput()" style="background: #6c757d">
          Clear
        </button>
      </div>

      <hr />
      <h3>📋 All Questions</h3>
      <button onclick="loadData()" style="background: #28a745">
        🔄 Refresh
      </button>
      <span class="status" id="statusText">Loading...</span>
      <div id="dataDisplay"></div>
    </div>

    <script>
      // === SUPABASE CONFIGURATION ===
      var SUPABASE_URL = "https://ezemjswkfngduvfwnexv.supabase.co";
      var SUPABASE_KEY = "sb_publishable_ua_WKYTJpQprRAXvEJ4i1g_EBYaYONk";

      var selectedNumber = 1;
      var allQuestions = [];

      // === CREATE XHR ===
      function createXHR() {
        try {
          return new XMLHttpRequest();
        } catch (e) {}
        try {
          return new ActiveXObject("Msxml2.XMLHTTP.6.0");
        } catch (e) {}
        try {
          return new ActiveXObject("Microsoft.XMLHTTP");
        } catch (e) {}
        return null;
      }

      // === GET ELEMENT ===
      function getEl(id) {
        return document.getElementById(id);
      }

      // === BUILD GRID ===
      function buildGrid() {
        var container = getEl("gridContainer");
        if (!container) return;

        var html = "";

        for (var i = 1; i <= 100; i++) {
          var status = getQuestionStatus(i);
          var cls = "box";
          var answerText = "";

          if (status === "answered") {
            cls += " answered";
            var q = getQuestionByNumber(i);
            if (q && q.answer) {
              answerText = q.answer;
            }
          } else if (status === "pending") {
            cls += " pending";
          }
          if (i === selectedNumber) cls += " selected";

          html +=
            '<div class="' + cls + '" onclick="selectQuestion(' + i + ')">';
          html += i;
          if (answerText) {
            html += '<span class="answer-text">' + answerText + "</span>";
          }
          html += "</div>";
        }

        container.innerHTML = html;
      }

      // === GET QUESTION STATUS ===
      function getQuestionStatus(num) {
        var q = getQuestionByNumber(num);
        if (!q) return "empty";
        if (q.answer && q.answer !== "") return "answered";
        return "pending";
      }

      // === GET QUESTION BY NUMBER ===
      function getQuestionByNumber(num) {
        for (var i = 0; i < allQuestions.length; i++) {
          if (allQuestions[i].number === num) {
            return allQuestions[i];
          }
        }
        return null;
      }

      // === SELECT QUESTION ===
      function selectQuestion(num) {
        selectedNumber = num;
        var label = getEl("selectedNumber");
        if (label) label.innerHTML = num;

        var input = getEl("questionInput");
        var existing = getQuestionByNumber(num);
        if (existing) {
          input.value = existing.question;
        } else {
          input.value = "";
        }

        buildGrid();
      }

      // === LOAD DATA ===
      function loadData() {
        var xhr = createXHR();
        if (!xhr) {
          return;
        }

        var url =
          SUPABASE_URL + "/rest/v1/exam_questions?select=*&order=id.asc";

        xhr.open("GET", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              try {
                var data = JSON.parse(xhr.responseText);
                allQuestions = [];
                for (var i = 0; i < data.length; i++) {
                  data[i].number = i + 1;
                  allQuestions.push(data[i]);
                }
                buildGrid();
                displayData();
                var statusEl = getEl("statusText");
                if (statusEl) statusEl.innerHTML = "✅ Updated";
              } catch (e) {
                var statusEl = getEl("statusText");
                if (statusEl) statusEl.innerHTML = "⚠️ Error parsing data";
              }
            } else {
              var statusEl = getEl("statusText");
              if (statusEl) statusEl.innerHTML = "⚠️ Error: " + xhr.status;
            }
          }
        };
        xhr.send();
      }

      // === SEND QUESTION ===
      function sendQuestion() {
        var input = getEl("questionInput");
        var q = input ? input.value : "";

        if (q.trim() === "") {
          alert("Paste a question first.");
          return;
        }

        var existing = getQuestionByNumber(selectedNumber);
        if (existing) {
          if (
            !confirm(
              "Question " + selectedNumber + " already exists. Replace it?",
            )
          ) {
            return;
          }
          deleteQuestion(existing.id, function () {
            sendNewQuestion(q);
          });
          return;
        }

        sendNewQuestion(q);
      }

      function sendNewQuestion(q) {
        var xhr = createXHR();
        if (!xhr) return;

        var url = SUPABASE_URL + "/rest/v1/exam_questions";
        var data = '{"question":"' + q.trim() + '","answer":""}';

        xhr.open("POST", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Prefer", "return=minimal");

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 201 || xhr.status === 200) {
              var input = getEl("questionInput");
              if (input) input.value = "";
              var statusEl = getEl("statusText");
              if (statusEl)
                statusEl.innerHTML = "✅ Question " + selectedNumber + " sent!";
              var nextNum = selectedNumber + 1;
              if (nextNum <= 100) {
                selectQuestion(nextNum);
              }
              loadData();
            } else {
              var statusEl = getEl("statusText");
              if (statusEl) statusEl.innerHTML = "⚠️ Error: " + xhr.status;
            }
          }
        };
        xhr.send(data);
      }

      // === ADD ANSWER ===
      function addAnswer(id) {
        var answer = prompt("📝 Enter the answer (a, b, c, or d):");
        if (answer && answer.trim() !== "") {
          var xhr = createXHR();
          if (!xhr) return;

          var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;
          var data = '{"answer":"' + answer.trim() + '"}';

          xhr.open("PATCH", url, true);
          xhr.setRequestHeader("apikey", SUPABASE_KEY);
          xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
          xhr.setRequestHeader("Content-Type", "application/json");
          xhr.setRequestHeader("Prefer", "return=minimal");

          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status === 200 || xhr.status === 204) {
                var statusEl = getEl("statusText");
                if (statusEl) statusEl.innerHTML = "✅ Answer added!";
                loadData();
              }
            }
          };
          xhr.send(data);
        }
      }

      // === DELETE QUESTION ===
      function deleteQuestion(id, callback) {
        var xhr = createXHR();
        if (!xhr) return;

        var url = SUPABASE_URL + "/rest/v1/exam_questions?id=eq." + id;

        xhr.open("DELETE", url, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
        xhr.setRequestHeader("Prefer", "return=minimal");

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200 || xhr.status === 204) {
              if (callback) callback();
              loadData();
            }
          }
        };
        xhr.send();
      }

      // === DISPLAY DATA ===
      function displayData() {
        var div = getEl("dataDisplay");
        if (!div) return;

        var html = "";

        if (!allQuestions || allQuestions.length === 0) {
          html = "<p>No questions yet. Select a number and send one!</p>";
          div.innerHTML = html;
          return;
        }

        for (var i = 0; i < allQuestions.length; i++) {
          var item = allQuestions[i];
          var qNum = item.number || i + 1;
          var hasAnswer = item.answer && item.answer !== "";

          html +=
            '<div style="padding:10px;margin:5px 0;border-left:5px solid ' +
            (hasAnswer ? "#28a745" : "#ffc107") +
            ';background:#fff;">';
          html +=
            "<strong>Q" + qNum + ":</strong> " + escapeHTML(item.question);
          if (hasAnswer) {
            html +=
              ' → <strong style="color:#28a745;">Answer: ' +
              escapeHTML(item.answer) +
              "</strong>";
          } else {
            html +=
              ' <button onclick="addAnswer(' +
              item.id +
              ')">📝 Add Answer</button>';
          }
          html += "</div>";
        }

        div.innerHTML = html;
      }

      // === ESCAPE HTML ===
      function escapeHTML(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // === CLEAR INPUT ===
      function clearInput() {
        var input = getEl("questionInput");
        if (input) input.value = "";
      }

      // === AUTO-REFRESH ===
      function autoRefresh() {
        loadData();
        setTimeout(autoRefresh, 10000);
      }

      // === INIT ===
      function init() {
        buildGrid();
        loadData();
        setTimeout(autoRefresh, 3000);
      }

      // === START ===
      if (document.readyState === "complete") {
        init();
      } else {
        window.attachEvent("onload", init);
      }
    </script>
  </body>
</html>
